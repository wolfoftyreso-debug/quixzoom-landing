<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thailand Workcamp 2026 🇹🇭</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(249, 115, 22, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(234, 179, 8, 0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      max-width: 560px;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(249, 115, 22, 0.25);
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(249, 115, 22, 0.08), 0 0 0 1px rgba(255,255,255,0.06) inset;
    }

    .flag {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 1.25rem;
      filter: drop-shadow(0 0 20px rgba(249,115,22,0.5));
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fb923c 0%, #facc15 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
      letter-spacing: 0.02em;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .unit {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(249, 115, 22, 0.15);
      border-radius: 1rem;
      padding: 1.25rem 0.5rem;
    }

    .unit-value {
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 800;
      color: #fb923c;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .unit-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      margin-top: 0.5rem;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(249,115,22,0.3), transparent);
      margin: 0 0 2rem;
    }

    .team-heading {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.25);
      margin-bottom: 1rem;
    }

    .team-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .team-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(249, 115, 22, 0.08);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 9999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .team-badge .avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fb923c33, #facc1533);
      border: 1px solid rgba(249,115,22,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #fb923c;
    }

    .footer-note {
      color: rgba(255,255,255,0.18);
      font-size: 0.75rem;
      letter-spacing: 0.03em;
    }

    .done-message {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.7);
      margin-top: 1rem;
    }

    @media (max-width: 400px) {
      .card { padding: 2rem 1.25rem; }
      .countdown-grid { gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="flag">🇹🇭</div>
    <h1>Vi ses i Bangkok!</h1>
    <p class="subtitle">Thailand Workcamp · 11 april 2026</p>

    <div class="countdown-grid" id="countdown">
      <div class="unit"><div class="unit-value" id="days">--</div><div class="unit-label">Dagar</div></div>
      <div class="unit"><div class="unit-value" id="hours">--</div><div class="unit-label">Timmar</div></div>
      <div class="unit"><div class="unit-value" id="minutes">--</div><div class="unit-label">Minuter</div></div>
      <div class="unit"><div class="unit-value" id="seconds">--</div><div class="unit-label">Sekunder</div></div>
    </div>

    <div class="divider"></div>

    <p class="team-heading">Hela teamet åker</p>
    <div class="team-grid">
      <div class="team-badge"><span class="avatar">E</span> Erik</div>
      <div class="team-badge"><span class="avatar">D</span> Dennis</div>
      <div class="team-badge"><span class="avatar">L</span> Leon</div>
      <div class="team-badge"><span class="avatar">W</span> Winston</div>
      <div class="team-badge"><span class="avatar">J</span> Johan</div>
    </div>

    <p class="footer-note">Vecka 1: teambuilding & utbildning · Projekten sätts upp och rullar ut 🚀</p>
  </div>

  <script>
    const TARGET = new Date('2026-04-11T00:00:00+07:00')

    function pad(n) { return String(n).padStart(2, '0') }

    function tick() {
      const now = new Date()
      const diff = TARGET.getTime() - now.getTime()

      if (diff <= 0) {
        document.getElementById('countdown').innerHTML =
          '<div style="grid-column:1/-1;font-size:1.5rem;font-weight:700;color:#fb923c;">Vi är i Thailand! 🎉</div>'
        clearInterval(interval)
        return
      }

      const days    = Math.floor(diff / (1000 * 60 * 60 * 24))
      const hours   = Math.floor((diff / (1000 * 60 * 60)) % 24)
      const minutes = Math.floor((diff / (1000 * 60)) % 60)
      const seconds = Math.floor((diff / 1000) % 60)

      document.getElementById('days').textContent    = pad(days)
      document.getElementById('hours').textContent   = pad(hours)
      document.getElementById('minutes').textContent = pad(minutes)
      document.getElementById('seconds').textContent = pad(seconds)
    }

    tick()
    const interval = setInterval(tick, 1000)
  </script>
</body>
</html>
